<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Patient Login - MedConnectAI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}" type="image/png">
</head>
<body>
  <main style="max-width:420px; margin:auto; padding:2rem; text-align:center;">
    <img src="{{ url_for('static', filename='favicon.png') }}" alt="Logo" style="width:80px; margin-bottom:1rem;">
    <h1>Patient Login</h1>

    {% if error %}
      <p style="color:red; margin-top:1rem;">{{ error }}</p>
    {% endif %}

    <form action="{{ url_for('patient_bp.patient_login') }}" method="POST" style="display:flex; flex-direction:column; gap:1rem; margin-top:1.5rem;">
      <input type="email" name="email" placeholder="Email" required style="padding:0.6rem; font-size:1rem;">
      <input type="password" name="password" placeholder="Password" required style="padding:0.6rem; font-size:1rem;">
      <button type="submit" style="padding:0.6rem; font-size:1rem; cursor:pointer;">Login</button>
    </form>

    <p style="margin-top:1.2rem;">
      Don't have an account? <a href="{{ url_for('patient_bp.patient_register') }}">Register here</a>
    </p>
    <p style="margin-top:0.5rem;"><a href="{{ url_for('home') }}">Back to home</a></p>
  </main>
</body>
</html>
