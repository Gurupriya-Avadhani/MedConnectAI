<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MedConnectAI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}" type="image/png">
</head>

<body>
<header class="header container">
  <div class="brand">
    <div class="logo">MC</div>
    <div>
      <h1>MedConnectAI</h1>
      <div style="font-size:0.85rem; color:var(--text-muted)">Smart Hospital Assistant</div>
    </div>
  </div>

  <div class="header-actions">
    <a class="btn ghost" href="{{ url_for('home') }}">Home</a>
    <!-- <a class="btn" href="{{ url_for('chatbot') }}">Ask MedBot</a> -->
  </div>
</header>

<main class="container">
  <section class="welcome">
    <div class="left">
      <h2 class="welcome-title">Welcome to MedConnectAI</h2>
      <p class="welcome-desc">Find doctors, book appointments, and get quick responses with MedBot.</p>

      <form action="{{ url_for('choose') }}" method="POST" class="role-row">
        <button type="submit" name="role" value="doctor" class="role-btn">Doctor</button>
        <button type="submit" name="role" value="patient" class="role-btn">Patient</button>
        <!-- <a class="role-btn secondary" href="{{ url_for('get_doctors') }}">Browse Doctors</a> -->
      </form>
    </div>

    <img class="banner" src="{{ url_for('static', filename='assets/images/banner.jpg') }}" alt="Hospital Banner">
  </section>

  <footer>&copy; 2025 MedConnectAI</footer>
</main>
</body>
</html>
