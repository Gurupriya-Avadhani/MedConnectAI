<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Patient Registration - MedConnectAI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <main style="max-width:480px; margin:auto; padding:2rem;">
    <h2>Patient Registration</h2>
    {% if error %}<p style="color:red;">{{ error }}</p>{% endif %}
    <form method="POST" style="display:flex; flex-direction:column; gap:0.8rem;">
      <label>Name</label>
      <input name="name" type="text" required>

      <label>Email</label>
      <input name="email" type="email" required>

      <label>Password</label>
      <input name="password" type="password" required>

      <label>Contact</label>
      <input name="contact" type="text">

      <label>Age</label>
      <input name="age" type="number" min="0">

      <label>Gender</label>
      <select name="gender">
        <option value="" disabled selected>Select</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>

      <button type="submit">Register</button>
    </form>

    <p style="margin-top:1rem;">Already registered? <a href="{{ url_for('patient_bp.patient_login') }}">Login here</a></p>
    <p style="margin-top:0.5rem;"><a href="{{ url_for('home') }}">Back to home</a></p>
  </main>
</body>
</html>
