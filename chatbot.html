<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MedBot</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <style>
    #chatbox { padding: 1rem; max-width: 420px; margin: 40px auto; font-family: 'Poppins', sans-serif; }
    #messages { height: 380px; overflow-y: auto; border: 1px solid #ddd; padding: 0.6rem; background: #fafafa; border-radius: 8px; }
    .user { text-align: right; margin: 8px 0; color: #111; background: #d1e7ff; display: inline-block; padding: 6px 10px; border-radius: 8px; max-width: 85%; }
    .bot { text-align: left; margin: 8px 0; color: #003366; background: #e8f0fe; display: inline-block; padding: 6px 10px; border-radius: 8px; max-width: 85%; }
    #userInput { flex: 1; padding: 0.6rem; border: 1px solid #ccc; border-radius: 6px; }
    #sendBtn { padding: 0.6rem 1rem; border: none; background: #0078d7; color: white; border-radius: 6px; cursor: pointer; }
    #sendBtn:hover { background: #005bb5; }
    .input-area { display: flex; gap: 0.5rem; margin-top: 0.8rem; }
  </style>
</head>
<body>
  <div id="chatbox">
    <h2 style="text-align:center; color:#004080;">💬 MedBot Assistant</h2>
    <div id="messages"></div>
    <div class="input-area">
      <input id="userInput" placeholder="Ask MedBot anything..." />
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script>
  const messagesEl = document.getElementById("messages");
  const input = document.getElementById("userInput");
  let userLocation = null;

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      userLocation = { lat: pos.coords.latitude, lon: pos.coords.longitude };
    },
    () => {
      console.warn("⚠️ Location access denied");
    }
  );

  function append(type, text) {
    const d = document.createElement("div");
    d.className = type;
    d.textContent = text;
    messagesEl.appendChild(d);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const msg = input.value.trim();
    if (!msg) return;
    append("user", "You: " + msg);
    input.value = "";
    try {
      const payload = { message: msg };
      if (userLocation) {
        payload.lat = userLocation.lat;
        payload.lon = userLocation.lon;
      }
      const r = await fetch("/api/llm/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await r.json();
      append("bot", "MedBot: " + (data.reply || "Sorry, no response"));
    } catch (err) {
      append("bot", "MedBot: Network error");
    }
  }

  document.getElementById("sendBtn").addEventListener("click", sendMessage);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") sendMessage(); });
  </script>
</body>
</html>
